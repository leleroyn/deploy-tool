services:
  deploy-tool:
    build:
      context: .
      dockerfile: Dockerfile
    image: deploy-tool:latest
    container_name: deploy-tool
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # 访问密码，修改为自己的密码
      - DEPLOY_PASSWORD=admin123
      # 脚本和配置文件路径（对应下方 volumes 挂载点）
      - SCRIPT_DIR=/app/script
      - CONFIG_FILE=/app/config.ini
      # 跳过脚本内部 ssh-agent 初始化
      - SKIP_SSH_INIT=1
    volumes:
      # 挂载配置文件（必须）
      - ./config.ini:/app/config.ini:ro
      # 挂载运维脚本（必须）
      - ./script:/app/script:ro
      # 挂载 SSH 密钥（容器内 ssh 需要）
      - ~/.ssh:/home/deploy/.ssh:ro
      # 日志目录（可选，持久化日志）
      - ./logs:/app/logs
    # 将宿主机 SSH agent 传入容器，避免在容器内管理密钥
    # Linux/Mac 下有效；Windows 需要用 SSH agent forwarding 替代
    # environment 里加：SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
    # volumes 里加：  - /run/host-services/ssh-auth.sock:/run/host-services/ssh-auth.sock

volumes: {}
